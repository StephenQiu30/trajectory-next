services:
  trajectory-next:
    container_name: trajectory-next
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
    # 日志滚动：防止磁盘写满
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
